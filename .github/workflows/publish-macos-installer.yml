name: Publish macOS installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-installer:
    runs-on: macos-14

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app and archive zip
        shell: bash
        run: |
          set -euo pipefail

          swift test
          swift build -c release

          APP_BUNDLE="PD200X Button.app"
          BUILD_DIR="$RUNNER_TEMP/build"
          LATEST_ZIP_PATH="$RUNNER_TEMP/pd200x-button-macos-latest.zip"

          rm -rf "$BUILD_DIR" "$LATEST_ZIP_PATH" "$LATEST_ZIP_PATH.sha256"
          mkdir -p "$BUILD_DIR/$APP_BUNDLE/Contents/MacOS" "$BUILD_DIR/$APP_BUNDLE/Contents/Resources"

          cp Packaging/Info.plist "$BUILD_DIR/$APP_BUNDLE/Contents/Info.plist"
          cp Packaging/pd200x-button-owned "$BUILD_DIR/$APP_BUNDLE/Contents/Resources/pd200x-button-owned"
          cp .build/release/PD200XButtonMenu "$BUILD_DIR/$APP_BUNDLE/Contents/MacOS/PD200XButtonMenu"
          # The probe binary is packaged as pd200x-button-helper to match the app's runtime lookup path.
          cp .build/release/pd200x-button-probe "$BUILD_DIR/$APP_BUNDLE/Contents/MacOS/pd200x-button-helper"
          chmod 755 "$BUILD_DIR/$APP_BUNDLE/Contents/MacOS/PD200XButtonMenu" \
            "$BUILD_DIR/$APP_BUNDLE/Contents/MacOS/pd200x-button-helper"
          codesign --force --deep --timestamp=none --sign - "$BUILD_DIR/$APP_BUNDLE"

          ditto -c -k --sequesterRsrc --keepParent \
            "$BUILD_DIR/$APP_BUNDLE" \
            "$LATEST_ZIP_PATH"

          shasum -a 256 "$LATEST_ZIP_PATH" > "$LATEST_ZIP_PATH.sha256"

      - name: Upload installer as release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST_ZIP_PATH="$RUNNER_TEMP/pd200x-button-macos-latest.zip"

          # Upload the stable-named asset so the /releases/latest/download/ URL is always current.
          gh release upload "${GITHUB_REF_NAME}" \
            "$LATEST_ZIP_PATH" \
            "$LATEST_ZIP_PATH.sha256" \
            --clobber

      - name: Check out default branch for Pages content
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: site

      - name: Publish installer to docs/downloads
        shell: bash
        run: |
          set -euo pipefail

          ZIP_SOURCE="$RUNNER_TEMP/pd200x-button-macos-latest.zip"
          SHA_SOURCE="$ZIP_SOURCE.sha256"
          TARGET_DIR="site/docs/downloads"
          TARGET_ZIP="$TARGET_DIR/pd200x-button-macos-latest.zip"
          TARGET_SHA="$TARGET_DIR/pd200x-button-macos-latest.zip.sha256"

          mkdir -p "$TARGET_DIR"
          cp "$ZIP_SOURCE" "$TARGET_ZIP"
          cp "$SHA_SOURCE" "$TARGET_SHA"

          cd site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/downloads/pd200x-button-macos-latest.zip docs/downloads/pd200x-button-macos-latest.zip.sha256
          git commit -m "chore: publish macOS app archive for ${GITHUB_REF_NAME}" || exit 0
          git push
